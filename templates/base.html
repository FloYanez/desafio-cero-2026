<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Clínica Dental{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <header>
    <div class="container header-inner">
      <div class="header-brand">
        <span class="header-icon">🦷</span>
        <span class="header-title">Clínica Dental</span>
      </div>
      <nav class="header-nav">
        {% if patient_id is defined %}
          <span class="patient-info">Paciente: <strong>{{ patient_id }}</strong></span>
        {% endif %}
        <a href="{{ url_for('backoffice') }}" class="nav-link {% if request.endpoint == 'backoffice' %}nav-link-active{% endif %}">Backoffice</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
